name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          scope: "@aliou"
          cache: "pnpm"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Get release info
        id: release-info
        run: |
          pnpm changeset status --output=release.json 2>/dev/null || echo '{"releases":[]}' > release.json
          node <<NODE
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const releases = release.releases?.filter(r => r.type !== 'none') || [];

          let title = 'Version Packages';
          let commit = 'Version Packages';
          if (releases.length === 1) {
            const { name, newVersion } = releases[0];
            title = 'Updating ' + name + ' to version ' + newVersion;
            commit = name + '@' + newVersion;
          } else if (releases.length > 1) {
            const summary = releases.map(r => r.name + '@' + r.newVersion).join(', ');
            title = 'Updating ' + summary;
            commit = summary;
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'title=' + title + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit=' + commit + '\n');
          NODE
          rm -f release.json
        continue-on-error: true

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          title: ${{ steps.release-info.outputs.title || 'Version Packages' }}
          commit: ${{ steps.release-info.outputs.commit || 'Version Packages' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Get published version
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sesame/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (tag only)
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi

  build-binary:
    name: Build ${{ matrix.artifact }}
    needs: publish
    if: needs.publish.outputs.published == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: sesame-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: sesame-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: sesame-darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA binary
        run: npx tsdown

      - name: Verify binary was produced
        run: |
          if [ ! -f dist/sesame ]; then
            echo "ERROR: SEA binary was not produced. tsdown may have silently failed."
            echo "Contents of dist/:"
            ls -la dist/
            exit 1
          fi

      - name: Rename binary
        run: mv dist/sesame dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.publish.outputs.version }}
        run: gh release upload "$TAG" dist/${{ matrix.artifact }} --clobber
