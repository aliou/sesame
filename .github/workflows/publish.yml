name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      cli_release: ${{ steps.versions.outputs.cli_release }}
      cli_version: ${{ steps.versions.outputs.cli_version }}
      cli_tag: ${{ steps.versions.outputs.cli_tag }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          scope: "@aliou"
          cache: "pnpm"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Get release info
        id: release-info
        run: |
          pnpm changeset status --output=release.json 2>/dev/null || echo '{"releases":[]}' > release.json
          node <<NODE
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const releases = release.releases?.filter(r => r.type !== 'none') || [];

          const packages = ['packages/sesame/package.json', 'packages/cli/package.json']
            .map(path => JSON.parse(fs.readFileSync(path, 'utf8')))
            .filter(pkg => pkg.name && pkg.version);

          const fallbackSummary = packages.map(pkg => pkg.name + '@' + pkg.version).join(', ');
          let title = 'Updating ' + fallbackSummary;
          let commit = fallbackSummary;
          if (releases.length === 1) {
            const { name, newVersion } = releases[0];
            title = 'Updating ' + name + ' to version ' + newVersion;
            commit = name + '@' + newVersion;
          } else if (releases.length > 1) {
            const summary = releases.map(r => r.name + '@' + r.newVersion).join(', ');
            title = 'Updating ' + summary;
            commit = summary;
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'title=' + title + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit=' + commit + '\n');
          NODE
          rm -f release.json
        continue-on-error: true

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          title: ${{ steps.release-info.outputs.title || 'Updating @aliou/sesame and @aliou/sesame-cli' }}
          commit: ${{ steps.release-info.outputs.commit || '@aliou/sesame, @aliou/sesame-cli' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Get package versions
        id: versions
        run: |
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          CLI_TAG="@aliou/sesame-cli@$CLI_VERSION"
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT
          echo "cli_tag=$CLI_TAG" >> $GITHUB_OUTPUT

          if git diff-tree --no-commit-id --name-only -r HEAD | grep -q '^packages/cli/package.json$'; then
            echo "cli_release=true" >> $GITHUB_OUTPUT
          else
            echo "cli_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create CLI GitHub Release
        if: steps.versions.outputs.cli_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.versions.outputs.cli_tag }}
        run: |
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Release $TAG"
          fi

  build-binary:
    name: Build ${{ matrix.artifact }}
    needs: publish
    if: needs.publish.outputs.cli_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: sesame-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: sesame-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: sesame-darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA binary
        run: pnpm --filter @aliou/sesame-cli run build:binary

      - name: Verify binary was produced
        run: |
          if [ ! -f packages/cli/dist/sesame ]; then
            echo "ERROR: SEA binary was not produced. tsdown may have silently failed."
            echo "Contents of packages/cli/dist/:"
            ls -la packages/cli/dist/
            exit 1
          fi

      - name: Rename binary
        run: mv packages/cli/dist/sesame packages/cli/dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.publish.outputs.cli_tag }}
        run: gh release upload "$TAG" packages/cli/dist/${{ matrix.artifact }} --clobber
