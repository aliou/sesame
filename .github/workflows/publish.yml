name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      staged: ${{ steps.check-publish.outputs.needs_staging }}
      cli_release: ${{ steps.cli-release.outputs.should_release }}
      cli_tag: ${{ steps.cli-release.outputs.tag }}
      cli_version: ${{ steps.cli-release.outputs.version }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          scope: "@aliou"
          cache: "pnpm"

      - name: Upgrade npm for stage publish support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Get release info
        id: release-info
        run: |
          pnpm changeset status --output=release.json 2>/dev/null || echo '{"releases":[]}' > release.json
          node <<NODE
          const fs = require('fs');
          const path = require('path');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const releases = release.releases?.filter(r => r.type !== 'none') || [];

          const dirs = fs.readdirSync('packages').filter(d => {
            const pkgPath = path.join('packages', d, 'package.json');
            return fs.statSync(path.join('packages', d)).isDirectory() && fs.existsSync(pkgPath);
          });
          const allPackages = dirs.map(d =>
            JSON.parse(fs.readFileSync(path.join('packages', d, 'package.json'), 'utf8'))
          );
          const fallbackSummary = allPackages
            .filter(pkg => pkg.name && pkg.version)
            .map(pkg => pkg.name + '@' + pkg.version)
            .join(', ');

          let title = 'Updating ' + fallbackSummary;
          let commit = fallbackSummary;
          if (releases.length === 1) {
            const { name, newVersion } = releases[0];
            title = 'Updating ' + name + ' to version ' + newVersion;
            commit = name + '@' + newVersion;
          } else if (releases.length > 1) {
            const summary = releases.map(r => r.name + '@' + r.newVersion).join(', ');
            title = 'Updating ' + summary;
            commit = summary;
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'title=' + title + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit=' + commit + '\n');
          NODE
          rm -f release.json
        continue-on-error: true

      - name: Create Release PR or Stage
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          title: ${{ steps.release-info.outputs.title }}
          commit: ${{ steps.release-info.outputs.commit }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for unpublished packages and stage
        id: check-publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSIONS=""
          for pkg_dir in packages/*/; do
            [ -f "$pkg_dir/package.json" ] || continue
            PACKAGE_NAME=$(node -p "require('$pkg_dir/package.json').name")
            LOCAL_VERSION=$(node -p "require('$pkg_dir/package.json').version")
            REGISTRY_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL_VERSION" != "$REGISTRY_VERSION" ]; then
              echo "Staging $PACKAGE_NAME@$LOCAL_VERSION"
              (cd "$pkg_dir" && npm stage publish)
              if [ -n "$VERSIONS" ]; then
                VERSIONS="$VERSIONS,$LOCAL_VERSION"
              else
                VERSIONS="$LOCAL_VERSION"
              fi
            fi
          done

          if [ -n "$VERSIONS" ]; then
            echo "needs_staging=true" >> "$GITHUB_OUTPUT"
            echo "version=$(echo "$VERSIONS" | cut -d',' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "needs_staging=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub releases
        if: steps.check-publish.outputs.needs_staging == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.check-publish.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          fi

      - name: Detect CLI release
        id: cli-release
        run: |
          current_version=$(node -p "require('./packages/cli/package.json').version")
          previous_version=$(git show HEAD^:packages/cli/package.json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).version))" || true)

          if [ -n "${previous_version:-}" ] && [ "$current_version" != "$previous_version" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=@aliou/sesame-cli@${current_version}" >> "$GITHUB_OUTPUT"
            echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create CLI GitHub Release
        if: steps.cli-release.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.cli-release.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          fi

  build-binary:
    name: Build ${{ matrix.artifact }}
    needs: publish
    if: needs.publish.outputs.cli_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: sesame-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: sesame-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: sesame-darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA binary
        run: pnpm --filter @aliou/sesame-cli run build:binary

      - name: Verify binary was produced
        run: |
          if [ ! -f packages/cli/dist/sesame ]; then
            echo "ERROR: SEA binary was not produced. tsdown may have silently failed."
            echo "Contents of packages/cli/dist/:"
            ls -la packages/cli/dist/
            exit 1
          fi

      - name: Rename binary
        run: mv packages/cli/dist/sesame packages/cli/dist/${{ matrix.artifact }}

      - name: Compute binary hash
        id: hash
        run: |
          HASH=$(node -e "const { createHash } = require('node:crypto'); const { readFileSync } = require('node:fs'); console.log('sha256-' + createHash('sha256').update(readFileSync('packages/cli/dist/${{ matrix.artifact }}')).digest('base64'))")
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "${HASH}" > ${{ matrix.artifact }}.sha256

      - name: Upload binary hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-hash
          path: ${{ matrix.artifact }}.sha256

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.publish.outputs.cli_tag }}
        run: gh release upload "$TAG" packages/cli/dist/${{ matrix.artifact }} --clobber

  update-flake-hashes:
    name: Update flake hashes
    needs: [publish, build-binary]
    if: needs.publish.outputs.cli_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download binary hash artifacts
        uses: actions/download-artifact@v4
        with:
          path: hashes
          merge-multiple: true

      - name: Update flake hashes
        run: |
          set -euo pipefail
          VERSION="${{ needs.publish.outputs.cli_version }}"
          DARWIN_ARM_HASH=$(cat hashes/sesame-darwin-arm64.sha256)
          LINUX_ARM_HASH=$(cat hashes/sesame-linux-arm64.sha256)
          LINUX_X64_HASH=$(cat hashes/sesame-linux-x64.sha256)

          sed -i "s|version = \"[^\"]*\";|version = \"${VERSION}\";|" flake.nix
          sed -i "s|hash = \"sha256-[^\"]*\"; # darwin|hash = \"${DARWIN_ARM_HASH}\"; # darwin|" flake.nix
          sed -i "s|hash = \"sha256-[^\"]*\"; # linux-arm64|hash = \"${LINUX_ARM_HASH}\"; # linux-arm64|" flake.nix
          sed -i "s|hash = \"sha256-[^\"]*\"; # linux-x64|hash = \"${LINUX_X64_HASH}\"; # linux-x64|" flake.nix

      - name: Commit flake hash update
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.nix; then
            echo "No flake.nix hash changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update binary hashes for @aliou/sesame-cli@${{ needs.publish.outputs.cli_version }}"
          git push origin main
