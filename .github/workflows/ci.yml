name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 25
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp run build

      - name: Check
        run: vp check

      - name: Test
        run: vp run test

  build-binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: sesame-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: sesame-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: sesame-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 25
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build SEA binary
        run: vp run build:binary

      - name: Verify binary was produced
        run: |
          if [ ! -f packages/cli/build/sesame ]; then
            echo "ERROR: SEA binary was not produced. pack may have silently failed."
            echo "Contents of packages/cli/build/:"
            ls -la packages/cli/build/
            exit 1
          fi

      - name: Rename binary
        run: mv packages/cli/build/sesame packages/cli/build/${{ matrix.artifact }}

      - name: Smoke test
        run: packages/cli/build/${{ matrix.artifact }} help

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/build/${{ matrix.artifact }}
