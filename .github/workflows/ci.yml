name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  build-binary:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: sesame-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: sesame-linux-arm64
          - os: macos-latest
            arch: arm64
            artifact: sesame-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SEA binary
        run: pnpm --filter @aliou/sesame-cli run build:binary

      - name: Verify binary was produced
        run: |
          if [ ! -f packages/cli/dist/sesame ]; then
            echo "ERROR: SEA binary was not produced. tsdown may have silently failed."
            echo "Contents of packages/cli/dist/:"
            ls -la packages/cli/dist/
            exit 1
          fi

      - name: Rename binary
        run: mv packages/cli/dist/sesame packages/cli/dist/${{ matrix.artifact }}

      - name: Smoke test
        run: packages/cli/dist/${{ matrix.artifact }} help

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/${{ matrix.artifact }}
